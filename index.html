<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Moonlit Pagoda</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #03060f; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(150,200,255,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(120,180,220,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🌙 MOONLIT PAGODA 🏯</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03060f);
scene.fog = new THREE.FogExp2(0x03060f, 0.015);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 10, 40);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI * 0.6;
controls.minDistance = 5;
controls.maxDistance = 65;

scene.add(new THREE.AmbientLight(0x050a15, 0.3));

const stoneMat = new THREE.MeshStandardMaterial({ color: 0x2a2530, roughness: 0.9 });
const redMat = new THREE.MeshStandardMaterial({ color: 0xaa1122, metalness: 0.3, roughness: 0.5 });
const goldMat = new THREE.MeshStandardMaterial({ color: 0xffcc22, metalness: 0.9 });
const woodMat = new THREE.MeshStandardMaterial({ color: 0x3a2010, roughness: 0.8 });

// Moonlit stone ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80, 40, 40),
  new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5); }
      void main() {
        float n = hash(floor(vUv * 30.0)) * 0.06;
        vec3 col = vec3(0.08, 0.08, 0.1) + n;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Moon
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(15, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0xe8e8d8, emissive: 0xaaa898, emissiveIntensity: 0.25 })
);
moon.position.set(-40, 60, -80);
scene.add(moon);

// Pagoda - 5 tiers
for (let tier = 0; tier < 5; tier++) {
  const y = tier * 5;
  const size = 10 - tier * 1.5;
  
  // Platform
  const platform = new THREE.Mesh(
    new THREE.BoxGeometry(size * 1.4, 0.5, size * 1.4),
    stoneMat
  );
  platform.position.set(0, y, 0);
  scene.add(platform);
  
  // Walls
  const wallMat = tier % 2 === 0 ? redMat : stoneMat;
  for (let w = 0; w < 4; w++) {
    const angle = (w / 4) * Math.PI * 2;
    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(size * 0.9, 3, 0.5),
      wallMat
    );
    wall.position.set(Math.cos(angle) * size * 0.5, y + 2, Math.sin(angle) * size * 0.5);
    wall.rotation.y = -angle;
    scene.add(wall);
  }
  
  // Roof
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(size * 1.1, 3, 4),
    new THREE.MeshStandardMaterial({ color: 0x1a1520 })
  );
  roof.position.set(0, y + 4, 0);
  roof.rotation.y = Math.PI / 4;
  scene.add(roof);
  
  // Roof eaves (curled up corners)
  for (let e = 0; e < 4; e++) {
    const eAngle = (e / 4) * Math.PI * 2 + Math.PI / 4;
    const eave = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.2, 1),
      new THREE.MeshStandardMaterial({ color: 0x1a1520 })
    );
    eave.position.set(
      Math.cos(eAngle) * size * 1.1,
      y + 4,
      Math.sin(eAngle) * size * 1.1
    );
    eave.rotation.y = -eAngle;
    scene.add(eave);
  }
  
  // Gold ornaments on roof tips
  const ornament = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    goldMat
  );
  ornament.position.set(0, y + 5.5, 0);
  scene.add(ornament);
}

// Stone lanterns
for (let l = 0; l < 8; l++) {
  const angle = (l / 8) * Math.PI * 2;
  const lr = 15 + Math.random() * 5;
  const lg = new THREE.Group();
  
  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.6, 0.8, 0.5, 8),
    stoneMat
  );
  lg.add(base);
  
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.4, 3, 8),
    stoneMat
  );
  shaft.position.y = 1.75;
  lg.add(shaft);
  
  const lanternBody = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1.5, 1),
    new THREE.MeshStandardMaterial({ color: 0xffddaa, emissive: 0xffaa66, emissiveIntensity: 2.0, transparent: true, opacity: 0.9 })
  );
  lanternBody.position.y = 3.75;
  lg.add(lanternBody);
  
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(0.8, 0.8, 4),
    stoneMat
  );
  roof.position.y = 5;
  roof.rotation.y = Math.PI / 4;
  lg.add(roof);
  
  lg.position.set(Math.cos(angle) * lr, 0, Math.sin(angle) * lr);
  scene.add(lg);
  
  const lLight = new THREE.PointLight(0xffaa66, 2, 10);
  lLight.position.set(Math.cos(angle) * lr, 4, Math.sin(angle) * lr);
  scene.add(lLight);
}

// Cherry blossom trees
for (let t = 0; t < 10; t++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 18 + Math.random() * 15;
  const tx = Math.cos(angle) * r;
  const tz = Math.sin(angle) * r;
  
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.6, 8, 12),
    woodMat
  );
  trunk.position.set(tx, 4, tz);
  trunk.rotation.z = (Math.random() - 0.5) * 0.2;
  scene.add(trunk);
  
  // Pink blossom cloud
  for (let b = 0; b < 5; b++) {
    const blossom = new THREE.Mesh(
      new THREE.SphereGeometry(2 + Math.random() * 2, 10, 10),
      new THREE.MeshStandardMaterial({ color: 0xffaacc, transparent: true, opacity: 0.7 })
    );
    blossom.position.set(
      tx + (Math.random() - 0.5) * 3,
      8 + Math.random() * 3,
      tz + (Math.random() - 0.5) * 3
    );
    scene.add(blossom);
  }
}

// Stone bridge
const bridgeGroup = new THREE.Group();
for (let pl = 0; pl < 6; pl++) {
  const plank = new THREE.Mesh(
    new THREE.BoxGeometry(3, 0.3, 1),
    woodMat
  );
  plank.position.set(0, 0.15, -3 + pl * 1.2);
  plank.rotation.y = 0.1;
  bridgeGroup.add(plank);
}

// Bridge rails
for (let r of [-1, 1]) {
  const rail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 5, 6),
    woodMat
  );
  rail.position.set(r * 1.5, 1, 0);
  rail.rotation.z = Math.PI / 2;
  bridgeGroup.add(rail);
  
  for (let p = 0; p < 4; p++) {
    const post = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.1, 1, 6),
      woodMat
    );
    post.position.set(r * 1.5, 0.5, -2 + p * 1.5);
    bridgeGroup.add(post);
  }
}
bridgeGroup.position.set(-15, 0, 15);
bridgeGroup.rotation.y = 0.5;
scene.add(bridgeGroup);

// Koi pond under bridge
const pondGeo = new THREE.CircleGeometry(8, 24);
const pondMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main() {
      float ripple = sin(length(vUv - 0.5) * 18.0 - uTime * 1.5) * 0.04;
      vec3 col = mix(vec3(0.02, 0.1, 0.25), vec3(0.05, 0.15, 0.3), ripple + 0.5);
      gl_FragColor = vec4(col, 0.88);
    }
  `
});
const pond = new THREE.Mesh(pondGeo, pondMat);
pond.rotation.x = -Math.PI / 2;
pond.position.set(-15, 0.05, 15);
pond.userData.isPond = true;
scene.add(pond);

// Koi fish
const koiColors = [0xff4422, 0xffffff, 0xffaa22, 0xff6644];
for (let k = 0; k < 8; k++) {
  const koi = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({ 
      color: koiColors[Math.floor(Math.random() * 4)], 
      emissive: koiColors[Math.floor(Math.random() * 4)],
      emissiveIntensity: 0.5 
    })
  );
  koi.scale.set(1, 0.4, 2);
  koi.position.set(-15 + (Math.random() - 0.5) * 12, 0.3, 15 + (Math.random() - 0.5) * 12);
  koi.userData.koiPhase = Math.random() * Math.PI * 2;
  koi.userData.isKoi = true;
  scene.add(koi);
}

// Falling petals
const petalCount = 300;
const petalPos = new Float32Array(petalCount * 3);
for (let i = 0; i < petalCount; i++) {
  petalPos[i*3] = (Math.random() - 0.5) * 70;
  petalPos[i*3+1] = Math.random() * 25;
  petalPos[i*3+2] = (Math.random() - 0.5) * 70;
}
const petalGeo = new THREE.BufferGeometry();
petalGeo.setAttribute('position', new THREE.BufferAttribute(petalPos, 3));
const petalMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.y = mod(p.y - uTime * 0.5, 30.0);
      p.x += sin(uTime * 0.3 + position.z * 0.1) * 1.2;
      p.z += cos(uTime * 0.25 + position.y * 0.05) * 0.4;
      gl_PointSize = 9.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.7;
      vec3 col = vec3(1.0, 0.7, 0.8);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, depthWrite: false
});
const petals = new THREE.Points(petalGeo, petalMat);
petals.userData.isPetals = true;
scene.add(petals);

// Will-o-wisps
const wispCount = 30;
const wispPos = new Float32Array(wispCount * 3);
for (let i = 0; i < wispCount; i++) {
  wispPos[i*3] = (Math.random() - 0.5) * 60;
  wispPos[i*3+1] = 0.5 + Math.random() * 5;
  wispPos[i*3+2] = (Math.random() - 0.5) * 60;
}
const wispGeo = new THREE.BufferGeometry();
wispGeo.setAttribute('position', new THREE.BufferAttribute(wispPos, 3));
const wispMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.x += sin(uTime * 0.2 + position.z * 0.05) * 2.0;
      p.y += cos(uTime * 0.15 + position.x * 0.05) * 0.6;
      gl_PointSize = 14.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.8;
      vec3 col = vec3(0.8, 0.9, 1.0);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const wisps = new THREE.Points(wispGeo, wispMat);
wisps.userData.isWisps = true;
scene.add(wisps);

// Stars
const starCount = 800;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 150 + Math.random() * 50;
  starPos[i*3] = Math.cos(theta) * r;
  starPos[i*3+1] = 30 + Math.random() * 70;
  starPos[i*3+2] = Math.sin(theta) * r;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.4 })));

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  if (petals.userData.isPetals) petals.material.uniforms.uTime.value = t;
  if (pond.userData.isPond && pond.material.uniforms.uTime) pond.material.uniforms.uTime.value = t;
  if (wisps.userData.isWisps) wisps.material.uniforms.uTime.value = t;
  
  scene.children.forEach(child => {
    if (child.userData.isKoi) {
      const ph = child.userData.koiPhase;
      child.position.x = -15 + Math.sin(t * 0.5 + ph) * 5;
      child.position.z = 15 + Math.cos(t * 0.5 + ph) * 5;
      child.rotation.y = t + ph;
    }
  });
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
